<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>DocSendGo Admin</title><style>
*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,Arial;background:#f3f6fb;color:#14213d}.login{min-height:100vh;display:grid;place-items:center;padding:20px}.card{background:#fff;border-radius:24px;padding:26px;box-shadow:0 20px 55px #33476d22;width:min(460px,100%)}h1{margin-top:0}.field{display:block;margin:12px 0}.field span{display:block;font-weight:800;margin-bottom:6px}.field input{width:100%;padding:13px;border:1px solid #d7dfed;border-radius:12px;font-size:15px}.btn{border:0;border-radius:12px;padding:12px 16px;background:#3159e8;color:#fff;font-weight:900;cursor:pointer}.error{color:#c62828;margin-top:12px}.app{display:none}.top{background:#111a30;color:#fff;padding:15px 20px;display:flex;justify-content:space-between;align-items:center}.wrap{max-width:1100px;margin:24px auto;padding:0 16px}.panel{background:#fff;border-radius:22px;padding:22px;box-shadow:0 12px 35px #33476d14}.search{display:grid;grid-template-columns:1fr auto;gap:10px}.search input{padding:13px;border:1px solid #d6deeb;border-radius:12px}.profile{margin-top:18px;border:1px solid #e1e7f0;border-radius:18px;padding:18px;display:none}.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}.toggle{display:inline-flex;align-items:center;gap:8px;font-weight:900}.features{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin:16px 0}.feature{border:1px solid #e1e7f0;padding:12px;border-radius:14px}.muted{color:#68758e}.success{color:#16803b;font-weight:800}.logout{background:#ef4444}.history{margin-top:24px}.item{border-bottom:1px solid #edf0f5;padding:11px 0}@media(max-width:600px){.search{grid-template-columns:1fr}.row .btn{width:100%}}
</style></head><body><section id="login" class="login"><div class="card"><h1>DocSendGo Admin</h1><p>Secure Early Access Manager</p><label class="field"><span>Email</span><input id="email" type="email"></label><label class="field"><span>Password</span><input id="password" type="password"></label><button class="btn" onclick="login()">Secure Login</button><div id="loginMsg" class="error"></div></div></section><section id="app" class="app"><header class="top"><b>🚀 Early Access Manager</b><button class="btn logout" onclick="firebase.auth().signOut()">Logout</button></header><main class="wrap"><div class="panel"><h2>Find User by User ID</h2><div class="search"><input id="userId" placeholder="Example: DSG7K9P2A"><button class="btn" onclick="findUser()">Find User</button></div><div id="msg" class="muted" style="margin-top:10px"></div><section id="profile" class="profile"><h3 id="name">User</h3><div class="muted" id="meta"></div><div class="row" style="margin-top:16px"><label class="toggle"><input id="enabled" type="checkbox"> Early Access ON</label></div><h4>Select Features</h4><div class="features"><label class="feature"><input type="checkbox" value="store_beta"> 🏪 Universal Store Beta</label><label class="feature"><input type="checkbox" value="smart_tools"> ✨ New Smart Tools</label><label class="feature"><input type="checkbox" value="ui_beta"> 🚀 New App Experience</label></div><button class="btn" onclick="saveAccess()">Save Access</button><div id="saveMsg" style="margin-top:10px"></div></section><div class="history"><h3>Recently Updated</h3><div id="recent" class="muted">Loading…</div></div></div></main></section>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script><script>
const firebaseConfig={apiKey:'AIzaSyDR0higGBdiwGGduTLwLpjIaQ8rtuhLayI',authDomain:'docsendgo.firebaseapp.com',projectId:'docsendgo',storageBucket:'docsendgo.firebasestorage.app',messagingSenderId:'112683079074',appId:'1:112683079074:web:1b8bef5b606eb0d0760efb'};firebase.initializeApp(firebaseConfig);const db=firebase.firestore();let selected=null;
async function login(){document.getElementById('loginMsg').textContent='';try{await firebase.auth().signInWithEmailAndPassword(email.value.trim(),password.value)}catch(e){loginMsg.textContent=e.message}}
firebase.auth().onAuthStateChanged(async u=>{if(!u){login.style.display='grid';app.style.display='none';return}const a=await db.collection('admins').doc(u.uid).get();if(!a.exists||a.data().active!==true){await firebase.auth().signOut();loginMsg.textContent='This account has no active admin permission.';return}login.style.display='none';app.style.display='block';loadRecent()});
async function findUser(){const id=userId.value.trim().toUpperCase();msg.textContent='Searching…';profile.style.display='none';const d=await db.collection('shops').doc(id).get();if(!d.exists){msg.textContent='User ID not found.';return}selected={id,...d.data()};const f=await db.collection('earlyAccess').doc(id).get();const flag=f.exists?f.data():{};name.textContent=selected.name||'DocSendGo User';meta.textContent=`User ID: ${id} • Type: ${selected.userType||'User'} • City: ${selected.city||'—'}`;enabled.checked=flag.enabled===true;document.querySelectorAll('.features input').forEach(x=>x.checked=(flag.features||[]).includes(x.value));msg.textContent='';profile.style.display='block'}
async function saveAccess(){if(!selected)return;const features=[...document.querySelectorAll('.features input:checked')].map(x=>x.value);await db.collection('earlyAccess').doc(selected.id).set({userId:selected.id,userName:selected.name||'',enabled:enabled.checked,features,updatedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedBy:firebase.auth().currentUser.uid},{merge:true});saveMsg.className='success';saveMsg.textContent='Early Access updated successfully.';loadRecent()}
async function loadRecent(){const box=document.getElementById('recent');try{const s=await db.collection('earlyAccess').orderBy('updatedAt','desc').limit(15).get();box.innerHTML=s.empty?'No updates yet.':s.docs.map(d=>{const x=d.data();return `<div class="item"><b>${x.userName||d.id}</b> — ${d.id}<br><span class="muted">${x.enabled?'ON':'OFF'} • ${(x.features||[]).join(', ')||'No feature selected'}</span></div>`}).join('')}catch(e){box.textContent='Recent list requires an index/order update or no data yet.'}}
</script></body></html>
