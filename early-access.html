const firebaseConfig={apiKey:'AIzaSyDR0higGBdiwGGduTLwLpjIaQ8rtuhLayI',authDomain:'docsendgo.firebaseapp.com',projectId:'docsendgo',storageBucket:'docsendgo.firebasestorage.app',messagingSenderId:'112683079074',appId:'1:112683079074:web:1b8bef5b606eb0d0760efb'};firebase.initializeApp(firebaseConfig);
const FEATURES={store_beta:{title:'Universal Store Beta',icon:'🏪',desc:'Try the latest Store Panel and billing improvements.',url:'store.html'},smart_tools:{title:'New Smart Tools',icon:'✨',desc:'Preview selected new document tools before public release.',url:'index.html#tools'},ui_beta:{title:'New App Experience',icon:'🚀',desc:'Preview experimental interface updates.',url:'index.html'}};
